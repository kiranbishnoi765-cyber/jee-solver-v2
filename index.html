<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Markdown renderer -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Math renderer -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JEE Solver Agent</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <span id="user-greeting" style="color:white; font-size:13px; margin-left:auto;"></span>
    <button id="logout-btn" style="background:#e53e3e; color:white; border:none; padding:6px 14px; border-radius:8px; cursor:pointer; font-size:13px;">Logout</button>
    <h1>JEE Solver Agent ⚡</h1>
    <select id="subject-select">
      <option value="Physics">Physics</option>
      <option value="Chemistry">Chemistry</option>
      <option value="Mathematics">Mathematics</option>
    </select>
  </header>
  <!-- Tina Didi -->
<div class="tina-container">
  <img id="tina-img" src="images/tina-normal.png" alt="Tina Didi" />
  <div class="tina-label">Tina Didi</div>
</div>

  <!-- CHAT AREA -->
  <main class="chat-box" id="chat-box">
    <!-- messages yahan aayenge JS se -->
  </main>

  <!-- INPUT AREA -->
  <footer class="input-area">
    <textarea id="question-input" placeholder="Apna question yahan likho..."></textarea>
    <button id="send-btn">Send</button>
  </footer>

  <script src="script.js"></script>
</body>
</html>
